services:
  api:
    build:
      context: ../..
      dockerfile: apps/video-api/Dockerfile
    env_file:
      - path: .env
        required: false
    environment:
      VIDEO_API_DATABASE_URL: postgresql+psycopg://video:video@postgres:5432/video_api
      VIDEO_API_REDIS_URL: redis://redis:6379/0
      VIDEO_API_JOBS_ROOT: /data/jobs
      VIDEO_API_REPO_ROOT: /workspace
      # Artifact retention (job workspaces under /data/jobs). The API sweeps at
      # startup; the worker sweeps periodically (Celery beat). 0 = keep forever.
      VIDEO_API_JOB_TTL_DAYS: ${VIDEO_API_JOB_TTL_DAYS:-15}
    command: uvicorn video_api.main:app --host 0.0.0.0 --port 8080
    ports:
      - "8080:8080"
    volumes:
      - video_jobs:/data/jobs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: ../..
      dockerfile: apps/video-api/Dockerfile
    env_file:
      - path: .env
        required: false
    environment:
      VIDEO_API_DATABASE_URL: postgresql+psycopg://video:video@postgres:5432/video_api
      VIDEO_API_REDIS_URL: redis://redis:6379/0
      VIDEO_API_JOBS_ROOT: /data/jobs
      VIDEO_API_REPO_ROOT: /workspace
      VIDEO_API_VOICE_ENGINE: ${VIDEO_API_VOICE_ENGINE:-chatterbox}
      VIDEO_API_VOICE_COMMAND: ${VIDEO_API_VOICE_COMMAND:-python generate_voice_en.py --engine chatterbox --exaggeration 0.45 --cfg-weight 0.55 --temperature 0.55 --tail-padding 0.45}
      # Kokoro engine knobs (used only when VIDEO_API_VOICE_ENGINE=kokoro):
      # language (en|fr) and the Kokoro voice id (e.g. af_bella EN, ff_siwis FR).
      VIDEO_API_VOICE_LANGUAGE: ${VIDEO_API_VOICE_LANGUAGE:-en}
      VIDEO_API_KOKORO_VOICE: ${VIDEO_API_KOKORO_VOICE:-af_bella}
      # MOSS TTS engine knobs (used only when VIDEO_API_VOICE_ENGINE=moss).
      VIDEO_API_MOSS_TTS_MODEL: ${VIDEO_API_MOSS_TTS_MODEL:-OpenMOSS-Team/MOSS-TTS-v1.5}
      VIDEO_API_MOSS_TTS_VOICE: ${VIDEO_API_MOSS_TTS_VOICE:-}
      VIDEO_API_MOSS_TTS_REFERENCE_AUDIO: ${VIDEO_API_MOSS_TTS_REFERENCE_AUDIO:-}
      VIDEO_API_MOSS_TTS_REFERENCE_TEXT: ${VIDEO_API_MOSS_TTS_REFERENCE_TEXT:-}
      VIDEO_API_MOSS_TTS_CONSISTENT_VOICE: ${VIDEO_API_MOSS_TTS_CONSISTENT_VOICE:-1}
      VIDEO_API_MOSS_TTS_DEVICE: ${VIDEO_API_MOSS_TTS_DEVICE:-auto}
      VIDEO_API_MOSS_TTS_DTYPE: ${VIDEO_API_MOSS_TTS_DTYPE:-auto}
      VIDEO_API_MOSS_TTS_COMMAND: ${VIDEO_API_MOSS_TTS_COMMAND:-}
      # Remote GPU TTS server, apps/tts-server (VIDEO_API_VOICE_ENGINE=moss-remote).
      VIDEO_API_TTS_SERVER_URL: ${VIDEO_API_TTS_SERVER_URL:-}
      VIDEO_API_TTS_SERVER_API_KEY: ${VIDEO_API_TTS_SERVER_API_KEY:-}
      VIDEO_API_TTS_SERVER_TIMEOUT: ${VIDEO_API_TTS_SERVER_TIMEOUT:-3600}
      # manim (default) keeps the Python/Manim path; remotion switches to the
      # React/Remotion render engine (same TTS, assemble, verify).
      VIDEO_API_RENDER_ENGINE: ${VIDEO_API_RENDER_ENGINE:-manim}
      # Render speed knobs (Remotion engine): output fps (30 default ~halves frames
      # vs 60), Chrome render concurrency (int or "75%"), and the x264 preset.
      VIDEO_API_RENDER_FPS: ${VIDEO_API_RENDER_FPS:-30}
      VIDEO_API_REMOTION_CONCURRENCY: ${VIDEO_API_REMOTION_CONCURRENCY:-75%}
      VIDEO_API_RENDER_X264_PRESET: ${VIDEO_API_RENDER_X264_PRESET:-faster}
      # Word-level forced alignment (Remotion): narration-synced visual cues.
      VIDEO_API_ALIGN_ENABLED: ${VIDEO_API_ALIGN_ENABLED:-1}
      VIDEO_API_ALIGN_DEVICE: ${VIDEO_API_ALIGN_DEVICE:-auto}
      # Per-scene LLM parallelism (scene coders / per-scene blueprint passes).
      VIDEO_API_LLM_PARALLEL: ${VIDEO_API_LLM_PARALLEL:-3}
      # Optional background music (file path visible from the worker + base dB),
      # looped and sidechain-ducked under the voice by assemble_en.sh.
      VIDEO_API_MUSIC_FILE: ${VIDEO_API_MUSIC_FILE:-}
      VIDEO_API_MUSIC_DB: ${VIDEO_API_MUSIC_DB:--26}
      # Artifact retention. The worker runs the periodic GC (Celery beat below);
      # TTL_DAYS=0 disables it, GC_INTERVAL_HOURS sets how often the sweep runs.
      VIDEO_API_JOB_TTL_DAYS: ${VIDEO_API_JOB_TTL_DAYS:-15}
      VIDEO_API_GC_INTERVAL_HOURS: ${VIDEO_API_GC_INTERVAL_HOURS:-6}
      MANIM_USE_UV: "0"
    # --beat runs the embedded scheduler in this single worker (concurrency 1),
    # which fires video_api.gc_job_artifacts every VIDEO_API_GC_INTERVAL_HOURS.
    # The schedule DB lives in /tmp (recreated on restart, which is fine).
    command: celery -A video_api.celery_app worker --beat --schedule=/tmp/celerybeat-schedule --loglevel=INFO --concurrency=${VIDEO_API_WORKER_CONCURRENCY:-1}
    volumes:
      - video_jobs:/data/jobs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  test:
    build:
      context: ../..
      dockerfile: apps/video-api/Dockerfile
    environment:
      VIDEO_API_DATABASE_URL: "sqlite+pysqlite:///:memory:"
      VIDEO_API_REDIS_URL: redis://redis:6379/0
      VIDEO_API_JOBS_ROOT: /tmp/video-api-jobs
      VIDEO_API_REPO_ROOT: /workspace
      VIDEO_API_FAKE_LLM: "1"
      MANIM_USE_UV: "0"
    command: pytest -q
    volumes:
      - ./src:/workspace/apps/video-api/src:ro
      - ./tests:/workspace/apps/video-api/tests:ro
      - ./docs:/workspace/apps/video-api/docs:ro
      - ../../videos:/workspace/videos:ro
    profiles:
      - test

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: video
      POSTGRES_PASSWORD: video
      POSTGRES_DB: video_api
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U video -d video_api"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  video_jobs:
  postgres_data:
