server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Docker's embedded DNS. Resolving the upstream at request time (via a variable
  # in proxy_pass) instead of at startup lets nginx boot even when the api
  # container isn't up or registered yet, and pick it up once it is — otherwise a
  # bare `proxy_pass http://api:8080` aborts with "host not found in upstream".
  resolver 127.0.0.11 valid=30s ipv6=off;

  # Static assets are content-hashed by Vite; cache them hard.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # Reverse-proxy the API so the browser stays same-origin (no CORS, and the
  # X-API-Key header the SPA sets is forwarded untouched).
  location /v1/ {
    set $api_upstream http://api:8080;
    proxy_pass $api_upstream$request_uri;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    # MP4 downloads and long polling: don't buffer, allow generous timeouts.
    proxy_buffering off;
    proxy_read_timeout 3600s;
    client_max_body_size 64m;
  }

  location = /healthz {
    set $api_upstream http://api:8080;
    proxy_pass $api_upstream$request_uri;
    proxy_set_header Host $host;
  }

  # SPA fallback: every other path serves index.html for client-side routing.
  location / {
    try_files $uri $uri/ /index.html;
  }
}
